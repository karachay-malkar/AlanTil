name: Apply AlanTil 12.2 router patch

on:
  push:
    branches: ["12.2"]
    paths:
      - ".github/workflows/apply-router-12-2.yml"

permissions:
  contents: write

jobs:
  patch-router:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: "12.2"
      - name: Patch router
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("src/app/router.js")
          text = path.read_text(encoding="utf-8")

          replacements = [
              (
                  '  settings: () => import("../features/settings/index.js?v=11.8.1"),',
                  '  account: () => import("../features/account/index.js?v=12.2"),\n  settings: () => import("../features/settings/index.js?v=12.2"),',
              ),
              (
                  '  song: "Песня — Алан тил",\n  settings: "Настройки — Алан тил",',
                  '  song: "Песня — Алан тил",\n  account: "Аккаунт — Алан тил",\n  settings: "Настройки — Алан тил",',
              ),
              (
                  '  if (first === "song" && second) return { route: "songs.song", params: { songId: second } };\n  if (first === "settings") {',
                  '  if (first === "song" && second) return { route: "songs.song", params: { songId: second } };\n  if (first === "account" && !second) return { route: "account.home", params: {} };\n  if (first === "settings") {',
              ),
              (
                  '  if (routeName === "songs.song") return params.songId ? `/song/${encodeSegment(params.songId)}` : "/songs";\n  if (routeName === "settings.home") return "/settings";',
                  '  if (routeName === "songs.song") return params.songId ? `/song/${encodeSegment(params.songId)}` : "/songs";\n  if (routeName === "account.home") return "/account";\n  if (routeName === "settings.home") return "/settings";',
              ),
              (
                  '      if (feature !== "settings") throw error;\n      const module = await import(`../features/settings/index.js?v=11.8.1&retry=${Date.now()}`);',
                  '      if (!["settings", "account"].includes(feature)) throw error;\n      const module = feature === "account"\n        ? await import(`../features/account/index.js?v=12.2&retry=${Date.now()}`)\n        : await import(`../features/settings/index.js?v=12.2&retry=${Date.now()}`);',
              ),
              (
                  '    if (current.route === "songs.playlists") return { route: "home", params: {} };\n    if (["settings.privacy", "settings.version"].includes(current.route)) return { route: "settings.home", params: {} };',
                  '    if (current.route === "songs.playlists") return { route: "home", params: {} };\n    if (current.route === "account.home") return { route: "home", params: {} };\n    if (["settings.privacy", "settings.version"].includes(current.route)) return { route: "settings.home", params: {} };',
              ),
          ]

          for old, new in replacements:
              if old not in text:
                  raise SystemExit(f"Expected router fragment not found:\n{old}")
              text = text.replace(old, new, 1)

          path.write_text(text, encoding="utf-8")
          PY
      - name: Commit router
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/app/router.js
          git diff --cached --quiet && exit 0
          git commit -m "12.2: add account route"
          git push origin HEAD:12.2
