name: QA AlanTil 12.2

on:
  push:
    branches: ["12.2"]
    paths:
      - ".github/workflows/qa-12-2.yml"

permissions:
  contents: write

jobs:
  qa:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: "12.2"
      - name: Check JavaScript syntax
        shell: bash
        run: |
          find src -type f -name '*.js' -print0 | while IFS= read -r -d '' file; do
            node --check "$file"
          done
      - name: Check local module imports
        shell: bash
        run: |
          python - <<'PY'
          import re
          from pathlib import Path

          root = Path('.')
          pattern = re.compile(r'(?:from\s+|import\s*\()\s*["\']([^"\']+)["\']')
          missing = []
          for file in root.joinpath('src').rglob('*.js'):
              text = file.read_text(encoding='utf-8')
              for specifier in pattern.findall(text):
                  if not specifier.startswith('.'):
                      continue
                  clean = specifier.split('?', 1)[0]
                  target = (file.parent / clean).resolve()
                  if not target.exists():
                      missing.append(f'{file}: {specifier}')
          if missing:
              raise SystemExit('Missing local imports:\n' + '\n'.join(missing))
          PY
      - name: Check version and account route
        shell: bash
        run: |
          grep -q 'appVersion = "12.2"' src/config/analytics.js
          grep -q 'account: () => import' src/app/router.js
          grep -q 'return "/account"' src/app/router.js
          grep -q 'Версия</dt><dd>12.2' src/features/settings/version.js
          grep -q 'hook_reject_blocked_email' supabase/schema.sql
      - name: Publish QA result
        shell: bash
        run: |
          printf 'AlanTil 12.2 QA: PASS\nJavaScript syntax: PASS\nLocal imports: PASS\nRouter/account/version/schema checks: PASS\n' > QA_12_2.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add QA_12_2.txt
          git commit -m "12.2: record QA pass"
          git push origin HEAD:12.2
