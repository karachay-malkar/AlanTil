name: Package AlanTil 12.2

on:
  push:
    branches: ["12.2"]
    paths:
      - ".github/workflows/package-12-2.yml"

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: "12.2"
      - name: Create clean project archive
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          from zipfile import ZIP_DEFLATED, ZipFile

          root = Path('.')
          archive = Path('AlanTil-12.2.zip')
          excluded = {
              '.github/workflows/apply-router-12-2.yml',
              '.github/workflows/qa-12-2.yml',
              '.github/workflows/package-12-2.yml',
              'QA_12_2.txt',
              'PACKAGE_RUN_ID.txt',
              'AlanTil-12.2.zip',
          }

          with ZipFile(archive, 'w', ZIP_DEFLATED) as output:
              for path in sorted(root.rglob('*')):
                  if not path.is_file():
                      continue
                  relative = path.as_posix()
                  if relative.startswith('.git/') or relative in excluded:
                      continue
                  output.write(path, f'AlanTil-12.2/{relative}')
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: AlanTil-12.2
          path: AlanTil-12.2.zip
          if-no-files-found: error
          retention-days: 7
      - name: Publish workflow run id
        shell: bash
        run: |
          printf '%s\n' "$GITHUB_RUN_ID" > PACKAGE_RUN_ID.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add PACKAGE_RUN_ID.txt
          git commit -m "12.2: publish package run id"
          git push origin HEAD:12.2
