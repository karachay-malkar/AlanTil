name: Apply AlanTil 12.4

on:
  push:
    branches:
      - "12.4"
    paths:
      - "._alantil_upload/**"
      - ".github/workflows/apply-alantil-12-4.yml"

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: "12.4"
          fetch-depth: 0

      - name: Apply verified project files
        shell: bash
        run: |
          set -euo pipefail
          cat ._alantil_upload/chunk-*.txt > /tmp/alantil-12.4.b64
          base64 --decode /tmp/alantil-12.4.b64 > /tmp/alantil-12.4.tar.gz
          echo "a97eb3a96cb37fbd87e51cdfccaebe51ad43a7302c7d7abe4645ed727023f577  /tmp/alantil-12.4.tar.gz" | sha256sum --check
          tar -xzf /tmp/alantil-12.4.tar.gz -C .
          rm -rf ._alantil_upload
          rm -f .github/workflows/apply-alantil-12-4.yml
          rmdir .github/workflows 2>/dev/null || true
          rmdir .github 2>/dev/null || true

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "12.4: add cloud progress and session statistics"
          git push origin HEAD:12.4
