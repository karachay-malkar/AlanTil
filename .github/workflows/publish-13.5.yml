name: Publish AlanTil 13.5

on:
  push:
    branches:
      - upload-13.5
    paths:
      - .upload/READY

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout upload branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reconstruct release patch
        shell: bash
        run: |
          set -euo pipefail
          cat .upload/patch-* > /tmp/AlanTil-13.5.patch

      - name: Create clean 13.5 branch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "AlanTil Release Bot"
          git config user.email "actions@users.noreply.github.com"
          git checkout --detach f1f86551d701c5f6fd7f2ec3b80e35c75d9d8baa
          git switch -C 13.5
          git apply --index /tmp/AlanTil-13.5.patch
          git commit -m "13.5: dynamic stations and word-based progress"
          git push origin 13.5 --force

      - name: Remove temporary upload branch
        if: success()
        shell: bash
        run: git push origin --delete upload-13.5 || true
