<!doctype html>
<html lang="ru" data-theme="alan-stone">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="description" content="AlanTil — приложение для изучения карачаево-балкарского языка." />
  <meta name="theme-color" content="#e7e0d1" />
  <title>Алан тил</title>
  <script>
    (() => {
      try {
        const restoredPath = sessionStorage.getItem("alantil_spa_path");
        if (!restoredPath) return;
        sessionStorage.removeItem("alantil_spa_path");
        history.replaceState(null, "", restoredPath);
      } catch {
        // Restricted storage must not prevent the application from loading.
      }
    })();
  </script>
  <link rel="stylesheet" href="/src/shared/styles/app.css?v=13.2" />
</head>
<body>
  <div id="appShell" class="appShell" data-feature="path" data-screen="home" data-layout="map" data-header="minimal" data-bottom-nav="true">
    <header id="appHeader" class="appHeader">
      <div class="appHeaderLeading">
        <button id="btnBackArrow" class="appHeaderBack hidden" type="button" aria-label="Назад" title="Назад">
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"></path></svg>
        </button>
      </div>
      <div class="appHeaderCenter">
        <span id="headerEyebrow" class="appHeaderEyebrow">АЛАН ТИЛ</span>
        <span id="headerTitle" class="appHeaderTitle">Путь</span>
        <span id="counter" class="appHeaderCounter hidden"></span>
        <span id="mode" class="appHeaderMode hidden"></span>
      </div>
      <div class="appHeaderTrailing">
        <img src="/assets/images/logo.png" class="appHeaderLogo" alt="Алан Тил" />
      </div>
    </header>

    <main id="appViewport" class="appViewport">
      <div id="appRoot" class="appScreenHost" aria-live="polite" aria-busy="false"></div>
    </main>

    <nav id="bottomNav" class="bottomNav" aria-label="Основная навигация">
      <button class="bottomNavItem" type="button" data-route="practice.home">
        <svg class="bottomNavIcon" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 4h7v7H4V4Zm9 0h7v7h-7V4ZM4 13h7v7H4v-7Zm9 0h7v7h-7v-7Z"></path></svg>
        <span>Практика</span>
      </button>
      <button class="bottomNavItem active" type="button" data-route="path.home">
        <svg class="bottomNavIcon" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 20 9.5 9l3 5L16 8l5 12H3Zm7.3-7.2L7.2 18h6.2l-3.1-5.2Zm6-1.1L13.8 18h4.9l-2.4-6.3Z"></path></svg>
        <span>Путь</span>
      </button>
      <button class="bottomNavItem" type="button" data-route="profile.home">
        <svg class="bottomNavIcon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 12a5 5 0 1 0 0-10 5 5 0 0 0 0 10Zm0 2c-5 0-9 2.5-9 5.5V22h18v-2.5C21 16.5 17 14 12 14Z"></path></svg>
        <span>Профиль</span>
      </button>
    </nav>
  </div>

  <div id="modalRoot" class="modalRoot"></div>
  <script type="module" src="/src/app/bootstrap.js?v=13.2"></script>
</body>
</html>
