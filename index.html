<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="AlanTil — приложение для изучения карачаево-балкарского языка." />
  <title>Алан тил</title>
  <script>
    (() => {
      try {
        const restoredPath = sessionStorage.getItem("alantil_spa_path");
        if (!restoredPath) return;
        sessionStorage.removeItem("alantil_spa_path");
        history.replaceState(null, "", restoredPath);
      } catch {
        // Restricted storage must not prevent the application from loading.
      }
    })();
  </script>
  <link rel="stylesheet" href="/src/shared/styles/tokens.css?v=13.1" />
  <link rel="stylesheet" href="/src/shared/styles/base.css" />
  <link rel="stylesheet" href="/src/shared/styles/layout.css" />
  <link rel="stylesheet" href="/src/shared/styles/components.css?v=13.1" />
  <link rel="stylesheet" href="/src/shared/styles/privacy.css?v=13.1" />
</head>
<body>
  <header id="appHeader" class="top">
    <div class="titleWrap">
      <div class="brand">
        <img src="/assets/images/logo.png" class="brandIcon" alt="Алан Тил" />
      </div>
      <button id="btnBackArrow" class="backArrow hidden" type="button" aria-label="Назад" title="Назад">
        <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"></path>
        </svg>
      </button>
    </div>
    <div class="meta">
      <span id="counter"></span>
      <span id="mode"></span>
    </div>
  </header>

  <main id="appRoot" class="wrap" aria-live="polite"></main>
  <nav id="bottomNav" class="bottomNav" aria-label="Основная навигация">
    <button class="bottomNavItem" type="button" data-route="practice.home"><span class="bottomNavIcon" aria-hidden="true">◫</span><span>Практика</span></button>
    <button class="bottomNavItem active" type="button" data-route="path.home"><span class="bottomNavIcon" aria-hidden="true">△</span><span>Путь</span></button>
    <button class="bottomNavItem" type="button" data-route="profile.home"><span class="bottomNavIcon" aria-hidden="true">◉</span><span>Профиль</span></button>
  </nav>
  <div id="modalRoot"></div>

  <script type="module" src="/src/app/bootstrap.js?v=13.1"></script>
</body>
</html>
